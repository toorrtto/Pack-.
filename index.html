<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Soul Dash — Pack Opener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;--surface:#0f0f1e;--surface2:#181828;--surface3:#202038;
  --border:#2d2d52;--border2:#3d3d6a;
  --accent:#8b72f8;--accent2:#6252d8;
  --gold:#e8b84b;--gold2:#c89a30;
  --text:#ddddf5;--muted:#7878a8;--dim:#4a4a72;
  --red:#e05555;--green:#4caf7d;--blue:#5588e8;
  --radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.cinzel,h1,h2,h3{font-family:'Cinzel',serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

#app{display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0f0f22,rgba(7,7,15,.96));border-bottom:1px solid var(--border);padding:0 16px;padding-top:env(safe-area-inset-top)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:10px;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.free-banner{background:linear-gradient(135deg,rgba(232,184,75,.12),rgba(139,114,248,.08));border:1px solid var(--gold2);border-radius:12px;padding:12px;margin-top:10px;text-align:center}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#8b72f8,#e8b84b);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:900;font-size:16px;color:#fff;box-shadow:0 0 14px rgba(139,114,248,.5);flex-shrink:0}
.logo-text{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:.08em;background:linear-gradient(90deg,#e8b84b,#8b72f8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{display:flex;gap:4px}
.tab-btn{background:transparent;border:1px solid transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.04em;padding:6px 10px;border-radius:8px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(139,114,248,.15);color:var(--accent);border-color:#6252d8}
main{flex:1;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-width:700px;margin:0 auto;width:100%}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.04em;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff;border:1px solid var(--accent);box-shadow:0 0 12px rgba(139,114,248,.2)}
.btn-primary:active{transform:scale(.97)}
.btn-gold{background:rgba(232,184,75,.1);color:var(--gold);border:1px solid var(--gold2)}
.btn-gold:active{background:rgba(232,184,75,.2)}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:active{background:var(--surface3)}
.btn-danger{background:rgba(224,85,85,.1);color:var(--red);border:1px solid rgba(224,85,85,.4)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn:disabled{opacity:.5;pointer-events:none}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-family:'Cinzel',serif;font-size:11px;color:var(--muted);letter-spacing:.06em}
input,select,textarea{font-family:'Crimson Pro',serif;font-size:16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:11px 14px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,114,248,.15)}
select option{background:var(--surface2)}

.modal-overlay{position:fixed;inset:0;background:rgba(7,7,15,.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);letter-spacing:.06em;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.modal-actions .btn{flex:1}

.empty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:50px 20px;color:var(--dim);text-align:center}
.empty-icon{font-size:48px;opacity:.4}
.empty p{font-size:17px;color:var(--muted)}
.empty small{font-size:13px}
.section-title{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);letter-spacing:.06em;margin-bottom:16px}
.error-msg{color:var(--red);font-size:13px;margin-top:6px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;color:var(--muted);font-family:'Cinzel',serif;font-size:14px}

/* OPEN TAB */
.config-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px;margin-bottom:14px}
.config-label{font-family:'Cinzel',serif;font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:8px}
.acc-pick{display:flex;flex-direction:column;gap:6px}
.acc-pick-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.acc-pick-item.active{background:rgba(139,114,248,.18);border-color:var(--accent)}
.acc-pick-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.acc-pick-item.active .acc-pick-name{color:var(--accent)}
.acc-pick-bal{font-family:'Cinzel',serif;font-size:13px;color:var(--gold)}
.acc-pick-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0}
.acc-pick-item.active .acc-pick-check{border-color:var(--accent);background:var(--accent)}
.pcb{flex:1;min-width:40px;padding:10px 2px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Cinzel',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent}
.pcb.active{background:rgba(139,114,248,.2);border-color:var(--accent);color:var(--accent)}
.open-btn-wrap{display:flex;justify-content:center;margin-top:6px}
.open-btn{padding:14px 48px;font-size:15px;background:linear-gradient(135deg,var(--accent2),#7b3fd8);border:1px solid var(--accent);animation:pglow 2.5s ease-in-out infinite}
@keyframes pglow{0%,100%{box-shadow:0 0 20px rgba(139,114,248,.3)}50%{box-shadow:0 0 40px rgba(139,114,248,.65)}}

/* OPENING SCREEN */
.opening-screen{position:fixed;inset:0;background:#04040c;z-index:100;overflow-y:auto;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.opening-header{text-align:center;margin-bottom:18px}
.opening-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:.1em}
.opening-sub{font-size:13px;color:var(--muted);margin-top:4px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-width:640px;margin:0 auto}
.pack-sep{font-family:'Cinzel',serif;font-size:11px;color:var(--dim);letter-spacing:.08em;text-align:center;padding:12px 0 4px;grid-column:1/-1}

/* card flip */
.cw{perspective:800px;cursor:pointer}
.ci{position:relative;width:100%;padding-bottom:140%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.cw.flipped .ci{transform:rotateY(180deg)}
.cf{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.cb{background:linear-gradient(135deg,#1a1035,#0d0820);border:1px solid var(--border2)}
.cb-pat{position:absolute;inset:0;border-radius:12px;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(139,114,248,.04) 8px,rgba(139,114,248,.04) 9px)}
.cb-circle{width:56%;height:56%;border-radius:50%;background:radial-gradient(circle,rgba(139,114,248,.28),transparent 70%);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:20px;color:rgba(139,114,248,.5)}
.cfr{transform:rotateY(180deg);flex-direction:column;padding:10px 8px;gap:4px}
.cfr-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;text-align:center;line-height:1.3;color:var(--text)}
.cfr-rar{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:20px;margin-top:auto}

/* rarity tiers: C U R VR SR LGR */
.rt-c  .cfr{background:linear-gradient(160deg,#151525,#0f0f1e);border:1px solid var(--border)}
.rt-c  .cfr-rar{background:rgba(120,120,168,.15);color:var(--muted);border:1px solid rgba(120,120,168,.3)}
.rt-u  .cfr{background:linear-gradient(160deg,#0d1f18,#0f1e16);border:1px solid #2d5244}
.rt-u  .cfr-rar{background:rgba(76,175,125,.15);color:var(--green);border:1px solid rgba(76,175,125,.35)}
.rt-r  .cfr{background:linear-gradient(160deg,#0d1530,#101828);border:1px solid #2d3e6a}
.rt-r  .cfr-rar{background:rgba(85,136,232,.2);color:var(--blue);border:1px solid rgba(85,136,232,.4)}
.rt-vr .cfr{background:linear-gradient(160deg,#1f1508,#1a1005);border:1px solid #5a4010}
.rt-vr .cfr-rar{background:rgba(232,184,75,.2);color:var(--gold);border:1px solid rgba(232,184,75,.4)}
.rt-sr .cfr{background:linear-gradient(160deg,#20083a,#180428);border:1px solid #7a1eb0;box-shadow:inset 0 0 18px rgba(184,114,232,.15)}
.rt-sr .cfr-rar{background:rgba(184,114,232,.25);color:#e0b8ff;border:1px solid rgba(184,114,232,.5)}
.rt-sr .cfr-name{background:linear-gradient(90deg,#e0b8ff,#c8a0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rt-lgr .cfr{background:linear-gradient(160deg,#200808,#180404);border:1px solid #c03030;box-shadow:inset 0 0 22px rgba(224,85,85,.2)}
.rt-lgr .cfr-rar{background:linear-gradient(90deg,rgba(232,184,75,.4),rgba(224,85,85,.4));color:#ffcc44;border:1px solid rgba(232,184,75,.7)}
.rt-lgr .cfr-name{background:linear-gradient(90deg,#ffdd66,#ff8844,#ffdd66);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.cw{opacity:0;transform:translateY(18px);animation:cappear .4s ease forwards}
@keyframes cappear{to{opacity:1;transform:translateY(0)}}
.cw.just-rev .ci{animation:rpop .4s ease}
@keyframes rpop{0%{transform:rotateY(180deg) scale(.8)}60%{transform:rotateY(180deg) scale(1.06)}100%{transform:rotateY(180deg) scale(1)}}
.cw.just-rev.rt-vr .cfr{animation:rglow-vr .8s ease forwards}
@keyframes rglow-vr{0%{box-shadow:0 0 0 rgba(232,184,75,0)}50%{box-shadow:0 0 30px rgba(232,184,75,.7)}100%{box-shadow:0 0 10px rgba(232,184,75,.2)}}
.cw.just-rev.rt-sr .cfr{animation:rglow-sr .9s ease forwards}
@keyframes rglow-sr{0%{box-shadow:0 0 0 rgba(184,114,232,0)}50%{box-shadow:0 0 50px rgba(184,114,232,.9),0 0 90px rgba(184,114,232,.4)}100%{box-shadow:0 0 18px rgba(184,114,232,.35)}}
.cw.just-rev.rt-lgr .cfr{animation:rglow-lgr 1.1s ease forwards}
@keyframes rglow-lgr{0%{box-shadow:0 0 0 rgba(224,85,85,0)}40%{box-shadow:0 0 60px rgba(232,184,75,1),0 0 100px rgba(224,85,85,.6)}100%{box-shadow:0 0 22px rgba(232,184,75,.4)}}

.opening-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0,rgba(4,4,12,.98),transparent);display:flex;gap:8px;justify-content:center;z-index:101}
.result-summary{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:16px;margin:16px auto 0;max-width:640px}
.rs-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);margin-bottom:10px}
.rs-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)}
.rs-row:last-child{border-bottom:none}
.rs-row strong{font-family:'Cinzel',serif;color:var(--text)}

/* SETS TAB */
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.set-band{height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.set-hrow{padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s}
.set-hrow:active{background:var(--surface2)}
.set-nm{font-family:'Cinzel',serif;font-size:15px;font-weight:700}
.set-meta{font-size:12px;color:var(--muted);margin-top:2px}
.set-body{padding:0 14px 14px;display:none}
.set-body.open{display:block}
.cli{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.cli:last-child{border-bottom:none}
.cli-nm{flex:1;font-family:'Cinzel',serif;font-size:12px}
.cli-rar{font-size:11px;color:var(--muted);min-width:40px;text-align:center}
.cli-w{font-family:'Cinzel',serif;font-size:11px;color:var(--dim);min-width:70px;text-align:right}

/* card input in modal */
.cil{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:280px;overflow-y:auto}
.cir{display:grid;grid-template-columns:1fr 72px 54px 26px;gap:6px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 8px}
.cir input{padding:5px 7px;font-size:14px;border-radius:6px}
.cir-rm{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:0 4px;line-height:1}
.ci-hdr{display:grid;grid-template-columns:1fr 72px 54px 26px;gap:6px;padding:0 8px;margin-bottom:2px}
.ci-hdr span{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:.04em}

/* HISTORY TAB */
.acc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.acc-band{height:3px;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.acc-hrow{padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background .15s}
.acc-hrow:active{background:var(--surface2)}
.acc-nm{font-family:'Cinzel',serif;font-size:15px;font-weight:700}
.acc-body{padding:0 14px 14px;display:none}
.acc-body.open{display:block}
.he{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.he-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.he-set{font-family:'Cinzel',serif;font-size:13px;color:var(--gold)}
.he-date{font-size:11px;color:var(--dim)}
.he-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.he-tag{padding:2px 7px;border-radius:20px;font-family:'Cinzel',serif;font-size:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted)}
.spill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-family:'Cinzel',serif;font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
.spill b{color:var(--text);font-weight:700}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo" id="logo-longpress">
        <div class="logo-icon">🎴</div>
        <div class="logo-text">SOUL DASH PACK</div>
      </div>
      <nav id="nav" style="display:none">
        <button class="tab-btn active" data-tab="open" onclick="switchTab('open')">🎴 開封</button>
        <button class="tab-btn" data-tab="sets" onclick="switchTab('sets')">📦 弾</button>
        <button class="tab-btn" data-tab="history" onclick="switchTab('history')">👤 履歴</button>
        <button class="tab-btn" data-tab="admin" id="admin-tab-btn" style="display:none" onclick="switchTab('admin')">🛡 管理者</button>
      </nav>
    </div>
  </header>
  <main id="main">
    <div class="loading-screen">
      <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
      <span>読み込み中…</span>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js'
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, orderBy, query, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js'

let db = null
let sets = [], accounts = [], history = []
let currentTab = 'open'
let selSetId = '', selPacks = 1, selAccId = ''
let expandedSets = new Set(), expandedAccs = new Set()
let isAdmin = false

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBpcp-asX73cs-09tbUHeKq7E-sAEP4YYg",
  authDomain: "soul-dash-pack.firebaseapp.com",
  projectId: "soul-dash-pack",
  storageBucket: "soul-dash-pack.firebasestorage.app",
  messagingSenderId: "8112910578",
  appId: "1:8112910578:web:795c5a545480b4fa59606b"
}
const $ = id => document.getElementById(id)
const esc = s => { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML }
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
const fmtG = n => (Number(n)||0).toLocaleString() + 'G'

// ── Boot ──
function boot() {
  try {
    const app = initializeApp(FIREBASE_CONFIG, 'pack-opener')
    db = getFirestore(app)
    $('nav').style.display = 'flex'
    onSnapshot(query(collection(db,'pack_sets'), orderBy('createdAt','desc')), snap => {
      sets = snap.docs.map(d => ({id:d.id,...d.data()}))
      if(!sets.find(s=>s.id===selSetId)) selSetId = sets.length ? sets[0].id : ''
      if(currentTab==='open') renderOpen()
      if(currentTab==='sets') renderSets()
    })
    onSnapshot(query(collection(db,'pack_accounts'), orderBy('createdAt','asc')), snap => {
      accounts = snap.docs.map(d => ({id:d.id,...d.data()}))
      if(!accounts.find(a=>a.id===selAccId)) selAccId = accounts.length ? accounts[0].id : ''
      if(currentTab==='open') renderOpen()
      if(currentTab==='history') renderHistory()
    })
    onSnapshot(query(collection(db,'pack_history'), orderBy('createdAt','desc')), snap => {
      history = snap.docs.map(d => ({id:d.id,...d.data()}))
      if(currentTab==='history') renderHistory()
      if(currentTab==='admin') renderAdmin()
    })
    renderOpen()
    setupLogoLongPress()
  } catch(e) {
    $('main').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Firebase接続エラー</p><small>${e.message}</small></div>`
  }
}

// ── Admin: long-press logo to unlock ──
function setupLogoLongPress() {
  const logo = $('logo-longpress')
  if(!logo) return
  let timer = null
  const start = () => { timer = setTimeout(()=>openAdminLogin(), 650) }
  const cancel = () => { clearTimeout(timer) }
  logo.addEventListener('pointerdown', start)
  logo.addEventListener('pointerup', cancel)
  logo.addEventListener('pointerleave', cancel)
  logo.addEventListener('pointercancel', cancel)
  logo.addEventListener('contextmenu', e=>e.preventDefault())
}
window.openAdminLogin = function(){
  showModal(`
  <div class="modal-handle"></div>
  <div class="modal-title">🛡 管理者ログイン</div>
  <div class="form-group"><label>パスワード</label><input type="password" id="admin-pw" placeholder="••••••••"></div>

// ── Weighted random ──
function wrandom(cards) {
  const pool = cards.filter(c => Number(c.weight) > 0)
  if(!pool.length) return cards[cards.length-1]
  const total = pool.reduce((s,c) => s + Number(c.weight), 0)
  let r = Math.random() * total
  for(const c of pool) { r -= Number(c.weight); if(r <= 0) return c }
  return pool[pool.length-1]
}
// ── Rarity tier → CSS class (LGR > SR > VR > R > U > C) ──
function rtier(card) {
  const r = (card.rarity||'').toUpperCase().trim()
  if(r==='LGR') return 'rt-lgr'
  if(r==='SR')  return 'rt-sr'
  if(r==='VR')  return 'rt-vr'
  if(r==='R')   return 'rt-r'
  if(r==='U')   return 'rt-u'
  return 'rt-c'
}

window.startOpening = async function(opts={}) {
  const isFree = opts.free === true
  const set = sets.find(s=>s.id===selSetId)
  if(!set||!set.cards||set.cards.length===0){alert('このセットにカードがありません');return}
  const acc = accounts.find(a=>a.id===selAccId)
  if(!acc){alert('プレイヤーを選択してください');return}
  if(isFree && acc.lastFreePackDate===todayStr()){alert('本日の無料パックは使用済みです');return}

  const packPrice = Number(set.packPrice)||0
  const packs = isFree ? 1 : selPacks
  const cost = isFree ? 0 : packPrice*packs
  const before = Number(acc.balance)||0
  if(!isFree && before < cost){alert('所持金が不足しています');return}

  const btn = isFree ? $('free-pack-btn') : $('open-btn')
  const origHtml = btn ? btn.innerHTML : ''
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner"></div>' }

  const results = Array.from({length:packs},()=>Array.from({length:5},()=>wrandom(set.cards)))
  const flat = results.flat()
  const after = before - cost

  try {
    await updateDoc(doc(db,'pack_accounts',acc.id), {
      balance: after,
      ...(isFree ? {lastFreePackDate: todayStr()} : {})
    })
    await addDoc(collection(db,'pack_history'),{
      accountId:acc.id, accountName:acc.name,
      setId:set.id, setName:set.name,
      packCount:packs, cost, isFree:!!isFree,
      balanceBefore:before, balanceAfter:after,
      cards:flat.map(c=>({name:c.name,rarity:c.rarity||'—'})),
      createdAt:serverTimestamp()
    })
  } catch(e) {
    if(btn){ btn.disabled=false; btn.innerHTML=origHtml }
    alert('開封の処理に失敗しました: '+e.message)
    return
  }
  if(btn){ btn.disabled=false; btn.innerHTML=origHtml }
  showOpeningScreen(set, results)
}

function showOpeningScreen(set, results) {
  document.getElementById('opening-screen')?.remove()
  const screen = document.createElement('div')
  screen.className='opening-screen'; screen.id='opening-screen'
  const flat = results.flat()
  let html='', idx=0
  results.forEach((pack,pi)=>{
    if(results.length>1) html+=`<div class="pack-sep">── PACK ${pi+1} ──</div>`
    pack.forEach(card=>{
      const tier=rtier(card)
      html+=`<div class="cw ${tier}" id="cw${idx}" style="animation-delay:${idx*55}ms" onclick="flipCard(${idx})">
        <div class="ci">
          <div class="cf cb"><div class="cb-pat"></div><div class="cb-circle">✦</div></div>
          <div class="cf cfr"><div class="cfr-name">${esc(card.name)}</div><div class="cfr-rar">${esc(card.rarity||'—')}</div></div>
        </div></div>`
      idx++
    })
  })
  screen.innerHTML=`
  <div class="opening-header">
    <div class="opening-title">📦 ${esc(set.name)}</div>
    <div class="opening-sub">${results.length}パック / ${flat.length}枚 — タップして開封</div>
  </div>
  <div class="cards-grid">${html}</div>
  <div id="rsw"></div>
  <div class="opening-footer">
    <button class="btn btn-ghost btn-sm" onclick="closeOpening()">✕ 閉じる</button>
    <button class="btn btn-primary btn-sm" onclick="revealAll()">⚡ 全部めくる</button>
  </div>`
  screen._results=results; screen._set=set; screen._flat=flat
  screen._revealed=0; screen._total=flat.length; screen._summaryShown=false
  document.body.appendChild(screen)
}

window.flipCard = function(idx) {
  const w=$('cw'+idx)
  if(!w||w.classList.contains('flipped'))return
  w.classList.add('flipped','just-rev')
  setTimeout(()=>w.classList.remove('just-rev'),1000)
  const s=$('opening-screen'); s._revealed++
  if(s._revealed===s._total) onAllRevealed(s)
}
window.revealAll = function() {
  const s=$('opening-screen'); let d=0
  for(let i=0;i<s._total;i++){
    const w=$('cw'+i)
    if(w&&!w.classList.contains('flipped')){
      setTimeout(()=>{w.classList.add('flipped','just-rev');setTimeout(()=>w.classList.remove('just-rev'),1000)},d)
      d+=70
    }
  }
  s._revealed = s._total
  setTimeout(()=>onAllRevealed(s),d+200)
}
function onAllRevealed(s){
  if(s._summaryShown) return
  s._summaryShown = true
  const rm={}
  s._flat.forEach(c=>{const k=c.rarity||'—';rm[k]=(rm[k]||0)+1})
  const rows=Object.entries(rm).sort((a,b)=>b[1]-a[1]).map(([r,n])=>`<div class="rs-row"><span>${esc(r)}</span><strong>${n}枚</strong></div>`).join('')
  const w=$('rsw'); if(w) w.innerHTML=`<div class="result-summary"><div class="rs-title">📋 結果まとめ</div>${rows}<div style="text-align:center;margin-top:10px;font-family:'Cinzel',serif;font-size:12px;color:var(--green)">✓ 自動保存済み</div></div>`
}

window.updateTotal = function() {
  const total = window.rarityBlocks.filter(Boolean).reduce((s,b)=>s+parseFloat(b.weight||0),0)
  const el = $('rb-total')
  if(!el) return
  const display = parseFloat(total.toFixed(4))

  const ok = Math.abs(total - 100) < 0.001
  el.style.color = ok ? 'var(--green)' : total > 100 ? 'var(--red)' : 'var(--gold)'
}

window.addRarityBlock = function(defaultRar='C', customName='', prefillWeight=null, prefillText='') {

  const container = $('rarity-blocks')
  if(!container) return

  const opts = RARITIES.map(r=>`<option value="${r.v}" ${r.v===def?.v&&!isCustom?'selected':''}>${esc(r.label)}</option>`).join('')

    </div>

window.submitAddSet = async function(){
  const name=$('sn').value.trim()
  const pw=$('ss-pw').value
  const err=$('se-err')
  err.style.display='none'
  if(!name){err.textContent='弾の名前を入力してください';err.style.display='block';return}
  if(pw!==PACK_PASS){err.textContent='パスワードが違います';err.style.display='block';return}
  const packPrice = Math.max(0, Number($('sp').value)||0)

  const total = window.rarityBlocks.filter(Boolean).reduce((s,b)=>s+parseFloat(b.weight||0),0)
  if(Math.abs(total - 100) >= 0.001){err.textContent=`確率の合計が ${parseFloat(total.toFixed(4))}% です。ちょうど 100% にしてください`;err.style.display='block';return}

  const cards=[]
  for(const block of window.rarityBlocks){
    if(!block) continue
    const lines=(block.text||'').split('\n').map(l=>l.trim()).filter(Boolean)
    for(const n of lines) cards.push({name:n, rarity:block.rarity, weight:parseFloat(block.weight)||0})
  }
  if(cards.length===0){err.textContent='カードを1枚以上追加してください';err.style.display='block';return}

  const btn=$('ss-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>'
  try{
    await addDoc(collection(db,'pack_sets'),{name,description:$('sd').value.trim(),packPrice,cards,createdAt:serverTimestamp()})
    closeModal()
  }catch(e){err.textContent='保存に失敗: '+e.message;err.style.display='block';btn.disabled=false;btn.innerHTML='✦ 作成する'}
}

// ── Edit existing set ──
function groupCardsToBlocks(cards){
  const map = new Map()
  for(const c of cards){
    const key = `${c.rarity}__${c.weight}`
    if(!map.has(key)) map.set(key, {rarity:c.rarity, weight:Number(c.weight), text:''})
    const b = map.get(key)
    b.text += (b.text?'\n':'') + c.name
  }
  return [...map.values()]
}

function renderHistory(){
  $('main').innerHTML=`
  <div class="section-title">👤 履歴</div>
  ${accounts.length===0?`<div class="empty"><div class="empty-icon">👤</div><p>アカウントがありません</p><small>下のボタンから追加してください</small></div>`:accounts.map(accCardHTML).join('')}

    <button class="btn btn-gold" onclick="openAddAcc()">＋ アカウント追加</button>
  </div>`

function accCardHTML(a){
  const open=expandedAccs.has(a.id)
  const ah=history.filter(h=>h.accountId===a.id)
  const tp=ah.reduce((s,h)=>s+(h.packCount||0),0)
  const tc=ah.reduce((s,h)=>s+(h.cards||[]).length,0)
  const balance=Number(a.balance)||0
  const hh=ah.length===0?`<p style="font-size:13px;color:var(--dim);text-align:center;padding:12px 0">開封履歴なし</p>`:
    ah.map(h=>{
      const date=h.createdAt?.toDate?h.createdAt.toDate().toLocaleDateString('ja-JP'):'—'
      const rm={}; (h.cards||[]).forEach(c=>{rm[c.rarity||'—']=(rm[c.rarity||'—']||0)+1})
      const rs=Object.entries(rm).map(([r,n])=>`${r}×${n}`).join(' / ')
      const costTxt = h.isFree ? '🎁 無料' : fmtG(h.cost||0)
      return `<div class="he">
        <div class="he-top"><span class="he-set">📦 ${esc(h.setName)}</span><span class="he-date">${date}</span></div>
        <div style="font-size:12px;color:var(--muted)">${h.packCount}パック / ${(h.cards||[]).length}枚 ｜ ${esc(rs)} ｜ ${costTxt}</div>
        <div class="he-tags">${(h.cards||[]).map(c=>`<span class="he-tag">${esc(c.name)}</span>`).join('')}</div>
      </div>`
    }).join('')
  return `<div class="acc-card">
    <div class="acc-band"></div>
    <div class="acc-hrow" onclick="toggleAcc('${a.id}')">
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
        <div class="acc-nm">👤 ${esc(a.name)}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap"><span class="spill">💰<b>${fmtG(balance)}</b></span><span class="spill">開封<b>${tp}P</b></span><span class="spill">計<b>${tc}枚</b></span></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <button class="btn btn-sm btn-gold" onclick="event.stopPropagation();openAdjustBalance('${a.id}')">💰</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();openDelAcc('${a.id}')">🗑</button>
        <span style="color:var(--muted);font-size:11px;width:14px;text-align:center">${open?'▲':'▼'}</span>
      </div>
    </div>
    <div class="acc-body ${open?'open':''}"><div style="padding-top:4px">${hh}</div></div>
  </div>`
}

window.openAdjustBalance = function(id){
  const acc = accounts.find(a=>a.id===id)
  if(!acc) return
  const balance = Number(acc.balance)||0
  showModal(`
  <div class="modal-handle"></div>
  <div class="modal-title">💰 所持金を調整</div>
  <p style="color:var(--muted);font-size:14px;margin-bottom:14px">「<strong style="color:var(--text)">${esc(acc.name)}</strong>」の現在の所持金: <strong style="color:var(--gold)">${fmtG(balance)}</strong></p>
  <div class="form-group">
    <label>操作</label>
    <select id="adj-type">
      <option value="deposit">入金（増やす）</option>
      <option value="withdraw">出金（減らす）</option>
      <option value="set">所持金を直接設定</option>
    </select>
  </div>
  <div class="form-group"><label>金額（G） *</label><input type="number" id="adj-amount" min="0" placeholder="例: 1000"></div>
  <div class="form-group"><label>パスワード *</label><input type="password" id="adj-pw" placeholder="••••••••"></div>
  <p id="adj-err" class="error-msg" style="display:none"></p>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-gold" id="adj-btn" onclick="submitAdjustBalance('${id}')">✦ 確定する</button>
  </div>`)
  setTimeout(()=>$('adj-amount')?.focus(),100)
}
window.submitAdjustBalance = async function(id){
  const acc = accounts.find(a=>a.id===id)
  if(!acc) return
  const currentBalance = Number(acc.balance)||0
  const type=$('adj-type').value
  const amount=parseFloat($('adj-amount').value)
  const pw=$('adj-pw').value
  const err=$('adj-err')
  err.style.display='none'
  if(!amount || amount<0){err.textContent='正しい金額を入力してください';err.style.display='block';return}
  if(pw!==PACK_PASS){err.textContent='パスワードが違います';err.style.display='block';return}
  let newBalance
  if(type==='deposit') newBalance = currentBalance + amount
  else if(type==='withdraw') newBalance = currentBalance - amount
  else newBalance = amount
  if(newBalance<0){err.textContent='所持金が0未満になります';err.style.display='block';return}
  const btn=$('adj-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>'
  try{
    await updateDoc(doc(db,'pack_accounts',id),{balance:newBalance})
    closeModal()
  }catch(e){err.textContent='保存に失敗: '+e.message;err.style.display='block';btn.disabled=false;btn.innerHTML='✦ 確定する'}
}

//  ADMIN TAB
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAdmin(){
  if(!isAdmin){ switchTab('open'); return }
  const rows = [...history].sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0))

  // 日付ごとにグループ化
  const WD = ['日','月','火','水','木','金','土']
  const groups = new Map() // key -> {label, items:[]}
  for(const h of rows){
    const d = h.createdAt?.toDate ? h.createdAt.toDate() : null
    const key = d ? `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` : '不明'
    const label = d ? `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）` : '日付不明'
    if(!groups.has(key)) groups.set(key, {label, items:[]})
    groups.get(key).items.push(h)
  }

  const html = groups.size===0 ? `<div class="empty"><div class="empty-icon">🛡</div><p>履歴がありません</p></div>` : [...groups.values()].map(g=>{
    const dayPacks = g.items.reduce((s,h)=>s+(h.packCount||0),0)
    const dayCost = g.items.reduce((s,h)=>s+(h.isFree?0:(h.cost||0)),0)
    const itemsHtml = g.items.map(h=>{
      const time = h.createdAt?.toDate ? h.createdAt.toDate().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '—'
      const before = Number(h.balanceBefore)||0, after = Number(h.balanceAfter)||0
      const delta = after - before
      const costTxt = h.isFree ? '🎁 無料' : fmtG(h.cost||0)
      return `<div class="he">
        <div class="he-top"><span class="he-set">👤 ${esc(h.accountName)} ｜ 📦 ${esc(h.setName)}</span><span class="he-date">${time}</span></div>
        <div style="font-size:12px;color:var(--muted)">${h.packCount}パック / ${(h.cards||[]).length}枚 ｜ 費用: ${costTxt}</div>
        <div style="font-size:12px;color:var(--dim);margin-top:2px">残高: ${fmtG(before)} → ${fmtG(after)} <span style="color:${delta>=0?'var(--green)':'var(--red)'}">(${delta>=0?'+':''}${fmtG(delta)})</span></div>
      </div>`
    }).join('')
    return `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)">
      <span style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:.04em">📅 ${g.label}</span>
      <span style="font-size:11px;color:var(--dim)">${dayPacks}パック ｜ 計${fmtG(dayCost)}</span>
    </div>
    ${itemsHtml}`
  }).join('')

  $('main').innerHTML = `
  <div class="section-title">🛡 管理者モード</div>
  <p style="font-size:13px;color:var(--dim);margin-bottom:6px">全プレイヤーの開封履歴とお金の変化（日付ごと・新しい順）</p>
  ${html}
  <div style="display:flex;justify-content:center;margin-top:16px">
    <button class="btn btn-ghost" onclick="logoutAdmin()">🔓 管理者モードを終了</button>
  </div>`
}

// ── Modal ──
function showModal(html){
  const o=document.createElement('div');o.className='modal-overlay';o.id='modal-overlay'
  o.innerHTML=`<div class="modal">${html}</div>`
  o.addEventListener('click',e=>{if(e.target===o)closeModal()})
  document.body.appendChild(o)
}
window.closeModal=()=>document.getElementById('modal-overlay')?.remove()

boot()
